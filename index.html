<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#14151a">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Decks">
<title>Decks</title>
<style>
  :root {
    --bg:#14151a; --bg2:#191b22; --surface:#1e2027; --surface2:#262933;
    --border:#34384a; --border2:#2a2d3a;
    --text:#e8e6e1; --text2:#9aa0b0; --text3:#6b7080;
    --mtg:#c9a84c; --mtg-dim:#8a7430;
    --ygo:#22d3ee; --ygo-dim:#1a7f93; --ygo-gold:#d4a017;
    --warn:#f59e0b; --err:#ef4444;
    --shadow:0 6px 20px rgba(0,0,0,.4);
  }
  * { box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }
  html, body { overflow-x:hidden; }
  body {
    background:
      radial-gradient(1200px 600px at 50% -10%, #20222c 0%, rgba(32,34,44,0) 60%),
      var(--bg);
    color:var(--text);
    font:16px/1.45 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding:
      calc(12px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right))
      calc(28px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left));
    max-width:600px; margin:0 auto; min-height:100vh;
  }
  @keyframes riseIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  @keyframes sheetUp { from { transform:translateY(100%); } to { transform:none; } }

  /* ── Header ───────────────────────────── */
  .brand { display:flex; align-items:baseline; gap:8px; margin:6px 2px 4px; }
  .brand h1 { font-size:21px; letter-spacing:.5px; font-weight:800; }
  .brand h1 .g { color:var(--mtg); }
  .brand .tag { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:1.5px; }
  .label { font-size:13px; color:var(--text2); margin:0 2px 14px; }
  .accent-strip { height:3px; border-radius:3px; margin:4px 2px 12px;
    background:linear-gradient(90deg, var(--mtg) 0%, var(--mtg-dim) 28%, transparent 50%, var(--ygo-dim) 72%, var(--ygo) 100%); opacity:.85; }

  /* ── Gate ─────────────────────────────── */
  #gate { animation:riseIn .4s ease both; }
  #gate p { color:var(--text2); font-size:14px; margin:24px 2px 12px; }
  input[type=password] {
    width:100%; padding:14px; font-size:17px; border-radius:12px;
    border:1px solid var(--border); background:var(--surface); color:var(--text);
  }
  input[type=password]:focus { outline:none; border-color:var(--mtg); }
  .btn-primary {
    width:100%; margin-top:12px; padding:14px 16px; font-size:16px; font-weight:700;
    border-radius:12px; border:none; background:var(--mtg); color:#1a1305;
    min-height:48px; cursor:pointer; transition:filter .15s;
  }
  .btn-primary:active { filter:brightness(.9); }
  label.remember { display:flex; gap:9px; align-items:center; font-size:14px; color:var(--text2); margin-top:16px; }
  label.remember input { width:20px; height:20px; accent-color:var(--mtg); }
  .err { color:var(--err); font-size:14px; margin-top:12px; min-height:18px; }

  /* ── Tabs (segmented) ─────────────────── */
  .tabs { display:flex; gap:4px; background:var(--bg2); border:1px solid var(--border2);
          border-radius:12px; padding:4px; margin:0 0 14px; position:sticky; top:6px; z-index:5;
          backdrop-filter:blur(8px); }
  .tabs button {
    flex:1; min-height:44px; border:none; background:transparent; color:var(--text2);
    font-size:14px; font-weight:600; border-radius:9px; cursor:pointer; transition:all .15s;
  }
  .tabs button.on { background:var(--surface2); color:var(--text); box-shadow:var(--shadow); }
  .tabs button.on.mtg { color:var(--mtg); }
  .tabs button.on.ygo { color:var(--ygo); }

  /* ── Deck cards ───────────────────────── */
  .deck { background:var(--surface); border:1px solid var(--border2); border-radius:14px;
          margin-bottom:10px; overflow:hidden; animation:riseIn .35s ease both; }
  .deck-head { display:flex; align-items:center; gap:10px; padding:14px 15px; cursor:pointer;
               min-height:56px; user-select:none; }
  .deck-head .info { flex:1; min-width:0; }
  .dname { font-weight:700; font-size:15.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dsub { font-size:12px; color:var(--text2); margin-top:3px; }
  .pill { display:inline-block; font-size:10.5px; font-weight:700; padding:1px 7px; border-radius:20px;
          background:var(--bg2); border:1px solid var(--border); color:var(--text2); margin-left:2px; vertical-align:1px; }
  .chev { color:var(--text3); font-size:13px; transition:transform .25s; flex-shrink:0; }
  .deck.open .chev { transform:rotate(90deg); }
  .deck-body { padding:0 15px 14px; }
  .deckart { aspect-ratio:3.6 / 1; overflow:hidden; position:relative; background:var(--bg2) no-repeat; }
  .deckart::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(20,21,26,0) 45%, var(--surface) 100%); }
  .search { width:100%; padding:11px 13px; font-size:15px; border-radius:11px; border:1px solid var(--border);
            background:var(--surface); color:var(--text); margin-bottom:10px; -webkit-appearance:none; }
  .search:focus { outline:none; border-color:var(--mtg); }
  .sortrow { display:flex; align-items:center; gap:8px; margin:-2px 2px 12px; }
  .sortrow label { font-size:12px; color:var(--text3); }
  .sortsel { flex:1; padding:9px 11px; font-size:14px; border-radius:9px; border:1px solid var(--border);
             background:var(--surface); color:var(--text); -webkit-appearance:none;
             background-image:linear-gradient(45deg,transparent 50%,var(--text3) 50%),linear-gradient(135deg,var(--text3) 50%,transparent 50%);
             background-position:calc(100% - 16px) center,calc(100% - 11px) center; background-size:5px 5px,5px 5px; background-repeat:no-repeat; }
  .sortsel:focus { outline:none; border-color:var(--mtg); }

  /* Find-a-card view */
  .findtabs { display:flex; gap:6px; margin-bottom:10px; }
  .findtabs button { flex:1; min-height:42px; border:1px solid var(--border2); background:var(--bg2);
    color:var(--text2); border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; }
  .findtabs button.on.mtg { color:var(--mtg); border-color:var(--mtg); background:var(--surface2); }
  .findtabs button.on.ygo { color:var(--ygo); border-color:var(--ygo); background:var(--surface2); }
  .findcard { background:var(--surface); border:1px solid var(--border2); border-radius:12px; padding:11px 13px; margin-bottom:8px; animation:riseIn .25s ease both; }
  .findname { font-size:15px; font-weight:700; cursor:pointer; }
  .findname .u { border-bottom:1px dotted var(--border); }
  .findmeta { font-size:11px; color:var(--text3); font-weight:400; margin-left:4px; }
  .findchips { display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
  .findchip { font-size:12px; background:var(--bg2); border:1px solid var(--border); border-radius:8px;
    padding:5px 10px; cursor:pointer; color:var(--text2); min-height:30px; display:inline-flex; align-items:center; gap:5px; }
  .findchip b { color:var(--text); } .findchip i { color:var(--text3); font-style:normal; font-size:10px; text-transform:uppercase; letter-spacing:.5px; }
  .deck.mtg { border-left:3px solid rgba(201,168,76,.75); }
  .deck.mtg .deck-head { background:linear-gradient(100deg, rgba(201,168,76,.07), transparent 55%); }
  .deck.ygo { border-left:3px solid rgba(34,211,238,.65); }
  .deck.ygo .deck-head { background:linear-gradient(100deg, rgba(34,211,238,.06), transparent 55%); }
  .deck.dim { opacity:.72; }

  /* section headers (Meta / Off-Meta / Physical) */
  .section { display:flex; align-items:center; gap:9px; margin:20px 2px 10px; }
  .section .bar { width:4px; height:15px; border-radius:2px; }
  .section .lbl { font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:1.2px; }
  .section .ct { font-size:11px; color:var(--text3); margin-left:auto; }

  /* MTG color-identity pips */
  .pips { display:inline-flex; gap:3px; margin-left:7px; vertical-align:-1px; }
  .pip { width:13px; height:13px; border-radius:50%; box-shadow:inset 0 0 0 1px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.07); }
  .pip.W { background:#f4eede; } .pip.U { background:#3a8fd0; } .pip.B { background:#4b4248; }
  .pip.R { background:#d64a3a; } .pip.G { background:#3aa468; } .pip.C { background:#b9b3a8; }

  /* combo branch "view" button */
  .branch .torow { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .viewbtn { border:1px solid var(--ygo-dim); background:rgba(34,211,238,.10); color:var(--ygo); font-size:11px;
             font-weight:600; padding:4px 10px; border-radius:8px; cursor:pointer; white-space:nowrap; min-height:30px; }
  .viewbtn:active { opacity:.55; }

  .actions { display:flex; gap:8px; margin:2px 0 12px; }
  .actions button { flex:1; min-height:44px; border-radius:10px; border:1px solid var(--border);
    background:var(--bg2); color:var(--text); font-size:13.5px; font-weight:600; cursor:pointer; }
  .actions button.combos { border-color:var(--ygo-dim); color:var(--ygo); }
  .actions button.guide { border-color:var(--mtg-dim); color:var(--mtg); }

  .group { margin-top:12px; }
  .gtitle { font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--text3);
            border-bottom:1px solid var(--border2); padding-bottom:4px; margin-bottom:6px; }
  .card { font-size:14px; padding:5px 0; display:flex; gap:8px; cursor:pointer; }
  .card:active { opacity:.55; }
  .card .cname { border-bottom:1px dotted var(--border); }
  .q { color:var(--text3); min-width:26px; font-variant-numeric:tabular-nums; }
  .empty { color:var(--text3); font-size:13px; padding:8px 0; }
  .hint { font-size:12px; color:var(--text3); margin:-4px 2px 12px; }

  /* card image popup */
  #cardpop { display:none; position:fixed; inset:0; z-index:70; background:rgba(8,9,12,.86);
             align-items:center; justify-content:center; flex-direction:column; gap:14px;
             padding:24px calc(20px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
             animation:riseIn .2s ease both; -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); }
  #cardpop img { max-width:100%; max-height:74vh; border-radius:14px; box-shadow:0 12px 40px rgba(0,0,0,.6); }
  #cardpop .cap { color:var(--text2); font-size:14px; font-weight:600; text-align:center; max-width:90%; }
  #cardpop .msg { color:var(--text2); font-size:14px; }
  #cardpop .dismiss { color:var(--text3); font-size:12px; }

  /* ── Sheet (guide / combos overlay) ───── */
  .sheet { position:fixed; inset:0; background:var(--bg); z-index:50; display:flex; flex-direction:column;
           animation:sheetUp .28s cubic-bezier(.2,.8,.2,1) both; }
  .sheet-head { display:flex; align-items:center; gap:12px; padding:
      calc(12px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 12px
      calc(14px + env(safe-area-inset-left));
    border-bottom:1px solid var(--border2); background:var(--bg2); }
  .sheet-head .stitle { flex:1; min-width:0; font-weight:700; font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sheet-head .accent { font-size:11px; text-transform:uppercase; letter-spacing:1px; }
  .sheet-close { border:none; background:var(--surface2); color:var(--text); width:44px; height:44px;
                 border-radius:10px; font-size:18px; cursor:pointer; flex-shrink:0; }
  .sheet-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:
      16px calc(16px + env(safe-area-inset-right)) calc(28px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left)); }

  /* markdown */
  .md h1,.md h2,.md h3,.md h4 { line-height:1.25; margin:18px 0 8px; }
  .md h1 { font-size:21px; color:var(--mtg); } .md h2 { font-size:18px; }
  .md h3 { font-size:16px; } .md h4 { font-size:14px; color:var(--text2); }
  .md p { margin:8px 0; color:var(--text); font-size:14.5px; }
  .md ul,.md ol { margin:8px 0 8px 20px; } .md li { margin:4px 0; font-size:14.5px; }
  .md strong { color:#fff; } .md em { color:var(--text2); }
  .md code { background:var(--surface2); padding:1px 5px; border-radius:5px; font-size:13px; }
  .md pre { background:var(--surface2); padding:12px; border-radius:8px; overflow-x:auto; font-size:13px; margin:10px 0; }
  .md blockquote { border-left:3px solid var(--mtg-dim); padding:2px 0 2px 12px; margin:10px 0; color:var(--text2); }
  .md hr { border:none; border-top:1px solid var(--border2); margin:16px 0; }
  .md a { color:var(--ygo); }

  /* combo navigator */
  .roots { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; }
  .roots button { min-height:40px; padding:0 13px; border-radius:9px; border:1px solid var(--border);
    background:var(--bg2); color:var(--text2); font-size:13px; font-weight:600; cursor:pointer; }
  .roots button.on { border-color:var(--ygo); color:var(--ygo); background:var(--surface2); }
  .crumb { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .crumb .back { min-height:40px; padding:0 12px; border-radius:9px; border:1px solid var(--border);
    background:var(--bg2); color:var(--text); font-size:13px; cursor:pointer; }
  .crumb .path { font-size:11px; color:var(--text3); }
  .node { border:1px solid var(--border); border-radius:12px; padding:15px 16px; }
  .node.end { border-color:var(--ygo-gold); }
  .node .nname { font-size:16px; font-weight:700; }
  .ntag { display:inline-block; font-size:11px; padding:1px 8px; border-radius:20px; background:var(--surface2);
          color:var(--text2); margin-left:6px; vertical-align:1px; }
  .ntag.gold { background:rgba(212,160,23,.16); color:var(--ygo-gold); }
  .ntag.warn { background:rgba(245,158,11,.14); color:var(--warn); }
  .ndoes { font-size:13.5px; color:var(--text2); margin-top:8px; line-height:1.55; }
  .branch { border-top:1px solid var(--border2); padding-top:11px; margin-top:11px; display:flex; gap:11px; }
  .math { font-family:ui-monospace, Menlo, monospace; font-size:11px; background:var(--bg2);
          border-radius:6px; padding:3px 8px; white-space:nowrap; height:fit-content; }
  .branch .to { flex:1; min-width:0; }
  .branch .tolink { font-size:14px; font-weight:700; color:var(--ygo); cursor:pointer; }
  .branch .todesc { font-size:12.5px; color:var(--text2); margin-top:3px; line-height:1.5; }
  .gynote, .endnote { border-top:1px solid var(--border2); margin-top:11px; padding-top:11px;
                      font-size:12.5px; color:var(--text2); }

  .meta { font-size:12px; color:var(--text3); text-align:center; margin:20px 0 4px; }

  /* update banner */
  #upd { display:none; position:fixed; left:0; right:0; bottom:0; z-index:60;
         padding:14px calc(14px + env(safe-area-inset-right)) calc(14px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
         background:var(--mtg); color:#1a1305; font-weight:700; text-align:center; font-size:14px;
         box-shadow:0 -4px 20px rgba(0,0,0,.4); cursor:pointer; animation:sheetUp .3s ease both; }
</style>
</head>
<body>
<div class="brand"><h1>DECK<span class="g">BUILDER</span></h1><span class="tag">mobile</span></div>
<div class="accent-strip"></div>

<div id="gate">
  <div class="label" id="gate-label"></div>
  <p>Enter your passphrase to unlock.</p>
  <input id="pass" type="password" autocomplete="current-password" placeholder="Passphrase" enterkeyhint="go">
  <button class="btn-primary" onclick="unlock()">Unlock</button>
  <label class="remember"><input id="remember" type="checkbox" checked> Remember on this device</label>
  <div class="err" id="err"></div>
</div>

<div id="app" style="display:none;">
  <div class="label" id="app-label"></div>
  <div class="tabs" id="tabs"></div>
  <input id="search" class="search" type="search" placeholder="Filter decks…" oninput="setFilter(this.value)">
  <div class="sortrow" id="sortrow">
    <label for="sortsel">Sort</label>
    <select id="sortsel" class="sortsel" onchange="setSort(this.value)">
      <option value="name">Name</option>
      <option value="power">Power level</option>
      <option value="opened">Last opened</option>
      <option value="count">Card count</option>
      <option value="modified">Last modified</option>
    </select>
  </div>
  <div class="hint">Tap any card to view it.</div>
  <div id="decks"></div>
  <div class="meta" id="meta"></div>
</div>

<div id="sheet-root"></div>
<div id="cardpop" onclick="hideCard()">
  <img id="cardpop-img" alt="" style="display:none;">
  <div class="msg" id="cardpop-msg">Loading…</div>
  <div class="cap" id="cardpop-cap"></div>
  <div class="dismiss">Tap anywhere to close</div>
</div>
<div id="upd" onclick="applyUpdate()">New deck data available — tap to update</div>

const LABEL = "Jake's Decks";

const MTG_GROUPS = [['C','Creatures'],['I','Instants & Sorceries'],['A','Artifacts'],['E','Enchantments'],['P','Planeswalkers'],['B','Battles'],['O','Other'],['','Unsorted'],['L','Lands']];
let DATA = null, activeTab = 'mtg';
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// ── crypto (mirrors scripts/mobile-crypto.mjs) ──
async function deriveKey(pass, salt, iterations) {
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations, hash:'SHA-256' }, base,
    { name:'AES-GCM', length:256 }, false, ['decrypt']);
}
const ub64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function tryDecrypt(pass) {
  const key = await deriveKey(pass, ub64(ENC.salt), ENC.iterations);
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv: ub64(ENC.iv) }, key, ub64(ENC.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

async function unlock() {
  const pass = document.getElementById('pass').value;
  const err = document.getElementById('err');
  err.textContent = '';
  try {
    DATA = await tryDecrypt(pass);
    if (document.getElementById('remember').checked) localStorage.setItem('dv_pass', pass);
    show();
  } catch { err.textContent = 'Wrong passphrase.'; }
}
document.getElementById('pass').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

function show() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = '';
  document.getElementById('app-label').textContent = DATA.label || LABEL;
  const tabs = [];
  if (DATA.mtg.length) tabs.push(['mtg', `MTG ${DATA.mtg.length}`, 'mtg']);
  if (DATA.ygo.length) tabs.push(['ygo', `YGO ${DATA.ygo.length}`, 'ygo']);
  tabs.push(['find', '🔎 Find', '']);
  if (!tabs.some(t => t[0] === activeTab)) activeTab = tabs[0]?.[0] || 'mtg';
  document.getElementById('tabs').innerHTML = tabs.map(([k, lbl, cls]) =>
    `<button class="${k === activeTab ? 'on ' + cls : ''}" onclick="setTab('${k}')">${esc(lbl)}</button>`).join('');
  document.getElementById('meta').textContent = `Updated ${new Date(DATA.generated).toLocaleString()}`;
  const inFind = activeTab === 'find';
  document.getElementById('search').style.display = inFind ? 'none' : '';
  document.getElementById('sortrow').style.display = inFind ? 'none' : '';
  const hint = document.querySelector('.hint'); if (hint) hint.style.display = inFind ? 'none' : '';
  if (inFind) renderFind(); else render();
}
function setTab(k) { activeTab = k; show(); }
function toggleDeck(el) { el.classList.toggle('open'); const b = el.querySelector('.deck-body'); b.hidden = !b.hidden; }

function cardRows(cards, game) {
  return cards.map(c => `<div class="card" data-card="${esc(c.n)}" data-game="${game}"><span class="q">${c.q}×</span><span class="cname">${esc(c.n)}</span></div>`).join('');
}

// Power-level colors (mirror app.js PWR_COLORS / YGO_PWR_COLORS).
const PWR_COLORS = { 1:'#6b7280', 2:'#22c55e', 3:'#84cc16', 4:'#f59e0b', 5:'#ef4444' };
const YGO_PWR_COLORS = { 1:'#6b7280', 2:'#22c55e', 3:'#f59e0b', 4:'#ef4444' };

function pipsHtml(colors) {
  const order = ['W', 'U', 'B', 'R', 'G'];
  const present = order.filter(c => (colors || []).includes(c));
  const list = present.length ? present : ['C']; // colorless
  return '<span class="pips">' + list.map(c => `<span class="pip ${c}"></span>`).join('') + '</span>';
}

function sectionHeader(label, count, color) {
  return `<div class="section"><span class="bar" style="background:${color};"></span>` +
         `<span class="lbl" style="color:${color};">${esc(label)}</span><span class="ct">${count}</span></div>`;
}

function deckCard(d, game, gIdx, dimmed) {
  const total = game === 'mtg' ? d.cards.reduce((s, c) => s + c.q, 0) : d.main.reduce((s, c) => s + c.q, 0);
  const pc = (game === 'mtg' ? PWR_COLORS : YGO_PWR_COLORS)[d.powerLevel];
  const pl = d.powerLevel
    ? `<span class="pill" style="border-color:${pc || 'var(--border)'};color:${pc || 'var(--text2)'};">${game === 'mtg' ? 'B' : 'Lv'}${d.powerLevel}${d.subScore ? ' · ' + d.subScore + '/10' : ''}</span>`
    : '';
  const pips = game === 'mtg' ? pipsHtml(d.colors) : '';
  let sub;
  if (game === 'mtg') sub = `${esc(d.player)} · ${total} cards`;
  else {
    const ex = d.extra.reduce((s, c) => s + c.q, 0), sd = d.side.reduce((s, c) => s + c.q, 0);
    sub = `${total} main · ${ex} extra` + (sd ? ` · ${sd} side` : '');
  }
  const b = d.banner;
  const art = (b && b.img)
    ? `<div class="deckart" style="background-image:url('${esc(b.img)}');background-size:${(b.zoom || 1) * 100}% auto;background-position:${((b.fx ?? 0.5) * 100).toFixed(1)}% ${((b.fy ?? 0.5) * 100).toFixed(1)}%;"></div>`
    : '';
  const acts = [];
  if (d.guide) acts.push(`<button class="guide" onclick="openGuide('${game}',${gIdx})">📖 Guide</button>`);
  if (d.combo) acts.push(`<button class="combos" onclick="openCombos('${game}',${gIdx})">🔗 Combos</button>`);
  const actions = acts.length ? `<div class="actions">${acts.join('')}</div>` : '';
  let body;
  if (game === 'mtg') {
    body = MTG_GROUPS.map(([letter, title]) => {
      const cs = d.cards.filter(c => (c.t || '') === letter);
      if (!cs.length) return '';
      const n = cs.reduce((s, c) => s + c.q, 0);
      return `<div class="group"><div class="gtitle">${title} · ${n}</div>${cardRows(cs, 'mtg')}</div>`;
    }).join('');
  } else {
    const sec = (t, cs) => cs.length ? `<div class="group"><div class="gtitle">${t} · ${cs.reduce((s, c) => s + c.q, 0)}</div>${cardRows(cs, 'ygo')}</div>` : '';
    body = sec('Main Deck', d.main) + sec('Extra Deck', d.extra) + sec('Side Deck', d.side);
  }
  return `<div class="deck ${game}${dimmed ? ' dim' : ''}" style="animation-delay:${Math.min(gIdx * 25, 250)}ms">
    ${art}
    <div class="deck-head" onclick="toggleDeck(this.parentNode)">
      <div class="info"><div class="dname">${esc(d.deck)}${pips}</div><div class="dsub">${sub} ${pl}</div></div>
      <div class="chev">▶</div>
    </div>
    <div class="deck-body" hidden>${actions}${body || '<div class="empty">No cards.</div>'}</div>
  </div>`;
}

let _filter = '';
function setFilter(v) { _filter = v; render(); }
function matchesFilter(d) {
  const f = _filter.trim().toLowerCase();
  if (!f) return true;
  return d.deck.toLowerCase().includes(f) || (d.commander || '').toLowerCase().includes(f);
}

let _sort = 'name';
function setSort(v) { _sort = v; render(); }
function _deckTotal(d) { return (d.cards ? d.cards : d.main).reduce((s, c) => s + c.q, 0); }
function sortDecks(items) {
  const ts = v => (v ? new Date(v).getTime() : 0);
  return [...items].sort((x, y) => {
    const a = x.d, b = y.d;
    if (_sort === 'power') return (b.powerLevel || 0) - (a.powerLevel || 0) || (b.subScore || 0) - (a.subScore || 0) || a.deck.localeCompare(b.deck);
    if (_sort === 'opened') return ts(b.lastOpened) - ts(a.lastOpened) || a.deck.localeCompare(b.deck);
    if (_sort === 'modified') return (b.lastModified || 0) - (a.lastModified || 0) || a.deck.localeCompare(b.deck);
    if (_sort === 'count') return _deckTotal(b) - _deckTotal(a) || a.deck.localeCompare(b.deck);
    return a.deck.localeCompare(b.deck);
  });
}

function render() {
  const el = document.getElementById('decks');
  if (activeTab === 'mtg') {
    // Group by player (Jake / Sean), players ordered by deck count desc — like the desktop.
    const idx = DATA.mtg.map((d, i) => ({ d, i })).filter(x => matchesFilter(x.d));
    const players = [...new Set(DATA.mtg.map(d => d.player))]
      .sort((a, b) => DATA.mtg.filter(d => d.player === b).length - DATA.mtg.filter(d => d.player === a).length || a.localeCompare(b));
    let h = '';
    for (const p of players) {
      const ds = sortDecks(idx.filter(x => x.d.player === p));
      if (ds.length) h += sectionHeader(p, ds.length, 'var(--mtg)') + ds.map(x => deckCard(x.d, 'mtg', x.i, false)).join('');
    }
    el.innerHTML = h || '<div class="empty">No decks match.</div>';
    return;
  }
  // YGO grouped like the app: Meta → Off-Meta → Physical (indices into DATA.ygo are stable refs).
  const idx = DATA.ygo.map((d, i) => ({ d, i })).filter(x => matchesFilter(x.d));
  const meta = sortDecks(idx.filter(x => x.d.kind === 'md' && !x.d.offMeta));
  const off  = sortDecks(idx.filter(x => x.d.kind === 'md' && x.d.offMeta));
  const phys = sortDecks(idx.filter(x => x.d.kind === 'physical'));
  let h = '';
  if (meta.length) h += sectionHeader('Meta', meta.length, 'var(--ygo)') + meta.map(x => deckCard(x.d, 'ygo', x.i, false)).join('');
  if (off.length)  h += sectionHeader('Off-Meta', off.length, 'var(--text2)') + off.map(x => deckCard(x.d, 'ygo', x.i, true)).join('');
  if (phys.length) h += sectionHeader('Physical', phys.length, 'var(--ygo-gold)') + phys.map(x => deckCard(x.d, 'ygo', x.i, false)).join('');
  el.innerHTML = h || '<div class="empty">No decks match.</div>';
}

// ── Find a card (reverse lookup: card → which decks) ──
let findGame = 'mtg', findQuery = '';
function setFindGame(g) { findGame = g; renderFind(); }
function setFindQuery(v) { findQuery = v; renderFindResults(); }

function renderFind() {
  if (!DATA.mtg.length) findGame = 'ygo';
  if (!DATA.ygo.length) findGame = 'mtg';
  document.getElementById('decks').innerHTML =
    `<div class="findtabs">
       <button class="${findGame === 'mtg' ? 'on mtg' : ''}" onclick="setFindGame('mtg')">MTG</button>
       <button class="${findGame === 'ygo' ? 'on ygo' : ''}" onclick="setFindGame('ygo')">YGO</button>
     </div>
     <input id="findinput" class="search" type="search" placeholder="Search a ${findGame.toUpperCase()} card by name…" oninput="setFindQuery(this.value)" value="${esc(findQuery)}">
     <div id="findresults"></div>`;
  renderFindResults();
}

function renderFindResults() {
  const out = document.getElementById('findresults');
  if (!out) return;
  const q = findQuery.trim().toLowerCase();
  if (q.length < 2) { out.innerHTML = `<div class="hint" style="margin:8px 2px;">Type at least 2 letters to find a ${findGame.toUpperCase()} card across your decks.</div>`; return; }
  const map = new Map();
  const add = (name, deck, qty, tag) => {
    if (!name.toLowerCase().includes(q)) return;
    if (!map.has(name)) map.set(name, []);
    map.get(name).push({ deck, qty, tag });
  };
  if (findGame === 'mtg') {
    for (const d of DATA.mtg) for (const c of d.cards) add(c.n, d.deck, c.q, d.player);
  } else {
    for (const d of DATA.ygo) {
      for (const c of d.main) add(c.n, d.deck, c.q, 'main');
      for (const c of d.extra) add(c.n, d.deck, c.q, 'extra');
      for (const c of d.side) add(c.n, d.deck, c.q, 'side');
    }
  }
  const names = [...map.keys()].sort((a, b) => a.localeCompare(b));
  if (!names.length) { out.innerHTML = `<div class="empty">No ${findGame.toUpperCase()} card matches “${esc(findQuery)}”.</div>`; return; }
  const cap = 80;
  out.innerHTML = names.slice(0, cap).map(name => {
    const locs = map.get(name);
    const deckCount = new Set(locs.map(l => l.deck)).size;
    const chips = locs.map(l => `<span class="findchip" data-deckname="${esc(l.deck)}" data-deckgame="${findGame}">${esc(l.deck)} <b>×${l.qty}</b>${findGame === 'mtg' ? ` <i>${esc(l.tag)}</i>` : (l.tag !== 'main' ? ` <i>${esc(l.tag)}</i>` : '')}</span>`).join('');
    return `<div class="findcard">
      <div class="findname" data-card="${esc(name)}" data-game="${findGame}"><span class="u">${esc(name)}</span><span class="findmeta">in ${deckCount} deck${deckCount > 1 ? 's' : ''}</span></div>
      <div class="findchips">${chips}</div>
    </div>`;
  }).join('') + (names.length > cap ? `<div class="hint" style="margin:10px 2px;">Showing ${cap} of ${names.length} — keep typing to narrow.</div>` : '');
}

function jumpToDeck(game, deckName) {
  activeTab = game; _filter = '';
  show();
  setTimeout(() => {
    const target = [...document.querySelectorAll('#decks .deck')]
      .find(c => c.querySelector('.dname')?.textContent.trim() === deckName);
    if (target) {
      if (target.querySelector('.deck-body').hidden) toggleDeck(target);
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 60);
}
// Clicking a deck chip in Find results jumps to that deck.
document.getElementById('decks').addEventListener('click', e => {
  const chip = e.target.closest('[data-deckname]');
  if (chip) { e.stopPropagation(); jumpToDeck(chip.getAttribute('data-deckgame'), chip.getAttribute('data-deckname')); }
});

// ── Sheets ──
function deckByRef(tab, i) { return tab === 'mtg' ? DATA.mtg[i] : DATA.ygo[i]; }
function closeSheet() { document.getElementById('sheet-root').innerHTML = ''; document.body.style.overflow = ''; }
function openSheet(title, accent, bodyHtml, accentLabel) {
  document.body.style.overflow = 'hidden';
  document.getElementById('sheet-root').innerHTML =
    `<div class="sheet"><div class="sheet-head">
       <button class="sheet-close" onclick="closeSheet()">✕</button>
       <div style="flex:1;min-width:0;"><div class="stitle">${esc(title)}</div>
         <div class="accent" style="color:${accent}">${esc(accentLabel)}</div></div>
     </div><div class="sheet-body" id="sheet-body">${bodyHtml}</div></div>`;
}

function openGuide(tab, i) {
  const d = deckByRef(tab, i);
  openSheet(d.deck, 'var(--mtg)', `<div class="md">${mdToHtml(d.guide)}</div>`, 'Deck Guide');
}

// ── Combo navigator (mirrors app.js renderComboTree, text-only) ──
let _combo = null;
function openCombos(tab, i) {
  const d = deckByRef(tab, i);
  _combo = { tree: d.combo, path: [d.combo.roots[0]] };
  openSheet(d.deck, 'var(--ygo)', '<div id="combo"></div>', 'Combo Lines');
  renderCombo();
}
function comboGo(id) { _combo.path.push(id); renderCombo(); }
function comboRoot(id) { _combo.path = [id]; renderCombo(); }
function comboBack() { _combo.path.pop(); renderCombo(); }
function renderCombo() {
  const { tree, path } = _combo;
  const cur = tree.nodes[path[path.length - 1]];
  if (!cur) { _combo.path = [tree.roots[0]]; return renderCombo(); }
  const chip = n => (n && n.length > 22) ? n.slice(0, 21) + '…' : n;
  let h = '<div class="roots">' + tree.roots.map(rid => {
    const n = tree.nodes[rid]; if (!n) return '';
    return `<button class="${path[0] === rid ? 'on' : ''}" onclick="comboRoot('${esc(rid)}')">${esc(chip(n.name))}</button>`;
  }).join('') + '</div>';
  if (path.length > 1) {
    h += `<div class="crumb"><button class="back" onclick="comboBack()">← back</button>
      <span class="path">${path.map(k => esc(chip(tree.nodes[k]?.name || k))).join(' › ')}</span></div>`;
  }
  const isEnd = !(cur.branches || []).length;
  h += `<div class="node${isEnd ? ' end' : ''}">`;
  h += `<div><span class="nname" data-card="${esc(cur.name)}" data-game="ygo" style="cursor:pointer;border-bottom:1px dotted var(--ygo-dim);">${esc(cur.name)}</span>`;
  if (cur.tag) h += `<span class="ntag">${esc(cur.tag)}</span>`;
  if (cur.starterType === '1-card') h += `<span class="ntag gold">1-card starter</span>`;
  else if (cur.starterType === 'needs-partner') h += `<span class="ntag warn">needs a partner</span>`;
  if (isEnd) h += `<span class="ntag gold">end of line</span>`;
  h += `</div>`;
  if (cur.role) h += `<div style="font-size:12px;color:var(--text3);margin-top:4px;">${esc(cur.role)}</div>`;
  h += `<div class="ndoes">${esc(cur.does || '')}</div>`;
  for (const b of (cur.branches || [])) {
    const t = tree.nodes[b.to]; if (!t) continue;
    h += `<div class="branch"><span class="math">${esc(b.math || '·')}</span>` +
      `<div class="to"><div class="torow">` +
      `<span class="tolink" onclick="comboGo('${esc(b.to)}')">${esc(t.name)} ›</span>` +
      `<button class="viewbtn" data-card="${esc(t.name)}" data-game="ygo">⤢ view card</button></div>` +
      `<div class="todesc">${esc(b.desc || '')}</div></div></div>`;
  }
  if (cur.gyNote) h += `<div class="gynote">♻ From the GY: ${esc(cur.gyNote)}</div>`;
  if (isEnd) h += `<div class="endnote">Top of the line — from here you're closing, not climbing.</div>`;
  h += `</div>`;
  document.getElementById('combo').innerHTML = h;
}

// ── Minimal markdown → HTML (offline, no deps) ──
function mdToHtml(md) {
  const lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
  let html = '', inUl = false, inOl = false, inCode = false, para = [];
  const inline = s => esc(s)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  const flushP = () => { if (para.length) { html += '<p>' + inline(para.join(' ')) + '</p>'; para = []; } };
  const flushUl = () => { if (inUl) { html += '</ul>'; inUl = false; } };
  const flushOl = () => { if (inOl) { html += '</ol>'; inOl = false; } };
  const flushAll = () => { flushP(); flushUl(); flushOl(); };
  for (const raw of lines) {
    if (/^```/.test(raw.trim())) { if (inCode) { html += '</pre>'; inCode = false; } else { flushAll(); html += '<pre>'; inCode = true; } continue; }
    if (inCode) { html += esc(raw) + '\n'; continue; }
    const line = raw.trim();
    if (!line) { flushAll(); continue; }
    let m;
    if (m = line.match(/^(#{1,6})\s+(.*)$/)) { flushAll(); const lv = Math.min(m[1].length, 4); html += `<h${lv}>${inline(m[2])}</h${lv}>`; continue; }
    if (/^(---|\*\*\*|___)$/.test(line)) { flushAll(); html += '<hr>'; continue; }
    if (m = line.match(/^[-*+]\s+(.*)$/)) { flushP(); flushOl(); if (!inUl) { html += '<ul>'; inUl = true; } html += '<li>' + inline(m[1]) + '</li>'; continue; }
    if (m = line.match(/^\d+[.)]\s+(.*)$/)) { flushP(); flushUl(); if (!inOl) { html += '<ol>'; inOl = true; } html += '<li>' + inline(m[1]) + '</li>'; continue; }
    if (m = line.match(/^>\s?(.*)$/)) { flushAll(); html += '<blockquote>' + inline(m[1]) + '</blockquote>'; continue; }
    para.push(line);
  }
  flushAll(); if (inCode) html += '</pre>';
  return html;
}

// ── Card image popup (tap a card → show; tap anywhere → dismiss) ──
// Images come from the same public APIs the webapp uses (Scryfall / ygoprodeck).
// First view of a card needs network; the service worker then caches it for offline.
let _cardSeq = 0;
async function showCard(name, game) {
  const seq = ++_cardSeq;
  const pop = document.getElementById('cardpop');
  const img = document.getElementById('cardpop-img');
  const msg = document.getElementById('cardpop-msg');
  const cap = document.getElementById('cardpop-cap');
  img.style.display = 'none'; img.src = '';
  msg.style.display = 'block'; msg.textContent = 'Loading…';
  cap.textContent = name;
  pop.style.display = 'flex';
  let url = null;
  try {
    if (game === 'mtg') {
      url = `https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(name)}&format=image&version=normal`;
    } else {
      const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?name=${encodeURIComponent(name)}`);
      if (res.ok) { const d = await res.json(); url = d.data && d.data[0] && d.data[0].card_images && d.data[0].card_images[0] && d.data[0].card_images[0].image_url; }
    }
  } catch { url = null; }
  if (seq !== _cardSeq) return; // a newer tap superseded this one
  if (!url) { msg.textContent = 'Card image unavailable (offline?).'; return; }
  img.onload = () => { if (seq === _cardSeq) { msg.style.display = 'none'; img.style.display = 'block'; } };
  img.onerror = () => { if (seq === _cardSeq) msg.textContent = 'Card image unavailable (offline?).'; };
  img.src = url;
}
function hideCard() {
  _cardSeq++;
  const pop = document.getElementById('cardpop');
  pop.style.display = 'none';
  document.getElementById('cardpop-img').src = '';
}
function _cardTapHandler(e) {
  const t = e.target.closest('[data-card]');
  if (t) { e.stopPropagation(); showCard(t.getAttribute('data-card'), t.getAttribute('data-game') || 'mtg'); }
}
document.getElementById('decks').addEventListener('click', _cardTapHandler);
document.getElementById('sheet-root').addEventListener('click', _cardTapHandler);

// ── Service worker + update banner ──
let _waitingSW = null;
function applyUpdate() { if (_waitingSW) _waitingSW.postMessage({ type: 'SKIP_WAITING' }); }
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      nw && nw.addEventListener('statechange', () => {
        if (nw.state === 'installed' && navigator.serviceWorker.controller) {
          _waitingSW = reg.waiting; document.getElementById('upd').style.display = 'block';
        }
      });
    });
  }).catch(() => {});
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return; refreshing = true; location.reload();
  });
}

// ── Boot ──
document.getElementById('gate-label').textContent = LABEL;
const saved = localStorage.getItem('dv_pass');
if (saved && ENC) tryDecrypt(saved).then(d => { DATA = d; show(); }).catch(() => localStorage.removeItem('dv_pass'));
</script>
